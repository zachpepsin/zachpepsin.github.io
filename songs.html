<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Song Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sort-icon {
            display: inline-block;
            vertical-align: middle;
            margin-left: 0.5rem;
            width: 1rem;
            height: 1rem;
        }
        /* Sticky Header Background Blur */
        .sticky-header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }
        /* Custom Scrollbar for filters */
        .filter-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .filter-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .filter-scroll::-webkit-scrollbar-thumb {
            background: #c7c7c7;
            border-radius: 3px;
        }
        .filter-scroll::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 p-4 font-sans text-gray-800 antialiased">
    
    <div class="container mx-auto max-w-4xl bg-white rounded-xl shadow-xl overflow-hidden">
        
        <div class="p-6 md:p-8 pb-4">
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-indigo-800 mb-2">
                🎶 Song Library
            </h1>
        </div>

        <div class="sticky top-0 z-40 sticky-header border-b border-gray-100 px-6 md:px-8 py-4 shadow-sm">
            
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-grow">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search by artist, song, year, or genre..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-200"
                    />
                    <svg class="absolute left-3 top-2.5 text-gray-400 w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <button id="toggle-filter-btn" class="flex items-center justify-center px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition border border-gray-300 gap-2 font-medium whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filters <span id="filter-count" class="hidden bg-indigo-600 text-white text-xs rounded-full px-2 py-0.5 ml-1">0</span>
                </button>

                <button id="random-song-btn" class="flex items-center justify-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition shadow-md gap-2 font-medium whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    Random
                </button>
            </div>

            <div id="filter-panel" class="hidden mt-4 pt-4 border-t border-gray-200 grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 p-4 rounded-lg shadow-inner">
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-gray-700">Genres</label>
                        <button id="clear-genres" class="text-xs text-indigo-600 hover:text-indigo-800 hover:underline">Clear</button>
                    </div>
                    <div id="genre-container" class="filter-scroll max-h-40 overflow-y-auto bg-white border border-gray-300 rounded-md p-2 space-y-1">
                        </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-gray-700">Decades</label>
                        <button id="clear-decades" class="text-xs text-indigo-600 hover:text-indigo-800 hover:underline">Clear</button>
                    </div>
                    <div id="decade-container" class="filter-scroll max-h-40 overflow-y-auto bg-white border border-gray-300 rounded-md p-2 space-y-1">
                        </div>
                </div>
                
            </div>
        </div>

        <div class="overflow-x-auto p-6 md:p-8 pt-0">
            <table class="min-w-full bg-white rounded-lg overflow-hidden shadow-sm border border-gray-200">
                <thead class="bg-gray-100 text-gray-700 border-b border-gray-200">
                    <tr>
                        <th class="py-3 px-4 text-left text-sm font-bold cursor-pointer select-none hover:bg-gray-200 transition w-1/4" data-sort-key="Artist">
                            <div class="flex items-center gap-2">Artist <span class="sort-icon" id="sort-icon-Artist"></span></div>
                        </th>
                        <th class="py-3 px-4 text-left text-sm font-bold cursor-pointer select-none hover:bg-gray-200 transition w-1/3" data-sort-key="Name">
                            <div class="flex items-center gap-2">Name <span class="sort-icon" id="sort-icon-Name"></span></div>
                        </th>
                        <th class="py-3 px-4 text-left text-sm font-bold cursor-pointer select-none hover:bg-gray-200 transition w-1/6" data-sort-key="Year">
                            <div class="flex items-center gap-2">Year <span class="sort-icon" id="sort-icon-Year"></span></div>
                        </th>
                        <th class="py-3 px-4 text-left text-sm font-bold cursor-pointer select-none hover:bg-gray-200 transition w-1/4" data-sort-key="Genre">
                            <div class="flex items-center gap-2">Genre <span class="sort-icon" id="sort-icon-Genre"></span></div>
                        </th>
                    </tr>
                </thead>
                <tbody id="song-list-body" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>

        <p class="text-center text-gray-500 text-xs mb-6">
            Data loaded from `songs.json`.
        </p>
    </div>

    <div id="random-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 hidden backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 transform transition-all scale-100 border border-gray-100">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 mb-4 shadow-sm">
                    <svg class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                </div>
                <h3 class="text-lg leading-6 font-bold text-gray-900 mb-2">Random Pick</h3>
                
                <div id="random-song-content" class="my-6">
                    </div>

                <div class="flex flex-col gap-3">
                    <button id="modal-new-random" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2.5 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none transition sm:text-sm">
                        Pick Another
                    </button>
                    <button id="modal-close" class="w-full inline-flex justify-center rounded-lg border border-gray-300 shadow-sm px-4 py-2.5 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none transition sm:text-sm">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let songs = [];
        let currentSortBy = 'Artist';
        let currentSortOrder = 'asc';
        
        function renderSongs(filteredAndSortedSongs) {
            const tableBody = document.getElementById('song-list-body');
            tableBody.innerHTML = '';

            if (filteredAndSortedSongs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-gray-500 italic">No songs found matching your criteria.</td></tr>`;
                return;
            }

            filteredAndSortedSongs.forEach(song => {
                // Ensure Year only displays the first 4 characters
                const displayYear = song.Year ? String(song.Year).substring(0, 4) : '-';
                
                const row = document.createElement('tr');
                row.classList.add('hover:bg-indigo-50', 'transition-colors');
                row.innerHTML = `
                    <td class="py-3 px-4 text-sm font-medium text-gray-900">${song.Artist || '-'}</td>
                    <td class="py-3 px-4 text-sm text-gray-600">${song.Name || '-'}</td>
                    <td class="py-3 px-4 text-sm text-gray-500">${displayYear}</td>
                    <td class="py-3 px-4 text-sm text-gray-500"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">${song.Genre || 'Unknown'}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function sortSongs(songsArray) {
            return [...songsArray].sort((a, b) => {
                const aValue = a[currentSortBy];
                const bValue = b[currentSortBy];
                if (aValue == null) return currentSortOrder === 'asc' ? 1 : -1;
                if (bValue == null) return currentSortOrder === 'asc' ? -1 : 1;
                
                if (typeof aValue === 'string') {
                    return currentSortOrder === 'asc' 
                        ? aValue.localeCompare(bValue, undefined, {sensitivity: 'base'}) 
                        : bValue.localeCompare(aValue, undefined, {sensitivity: 'base'});
                }
                return currentSortOrder === 'asc' ? aValue - bValue : bValue - aValue;
            });
        }

        // --- Filtering Logic ---

        function populateFilters() {
            const genreContainer = document.getElementById('genre-container');
            const decadeContainer = document.getElementById('decade-container');
            
            const genres = new Set();
            const decades = new Set();

			songs.forEach(song => {
					if (song.Genre) genres.add(song.Genre);
					if (song.Year) {
						// Take only the first 4 characters to handle "1966 (August 5)"
						const yearNum = parseInt(String(song.Year).substring(0, 4));
						if (!isNaN(yearNum)) {
							const decade = Math.floor(yearNum / 10) * 10;
							decades.add(decade);
						}
					}
				});

            // Populate Genre Checkboxes
            Array.from(genres).sort().forEach(g => {
                const div = document.createElement('div');
                div.className = "flex items-center";
                div.innerHTML = `
                    <input id="genre-${g}" type="checkbox" name="genre" value="${g}" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                    <label for="genre-${g}" class="ml-2 block text-sm text-gray-700 cursor-pointer select-none flex-grow">${g}</label>
                `;
                genreContainer.appendChild(div);
            });

            // Populate Decade Checkboxes
            Array.from(decades).sort((a,b) => b-a).forEach(d => {
                const div = document.createElement('div');
                div.className = "flex items-center";
                div.innerHTML = `
                    <input id="decade-${d}" type="checkbox" name="decade" value="${d}" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                    <label for="decade-${d}" class="ml-2 block text-sm text-gray-700 cursor-pointer select-none flex-grow">${d}s</label>
                `;
                decadeContainer.appendChild(div);
            });

            // Attach listeners to new checkboxes
            document.querySelectorAll('input[name="genre"], input[name="decade"]').forEach(cb => {
                cb.addEventListener('change', updateDisplay);
            });
        }

        function getFilteredList() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            // Get selected checkboxes
            const selectedGenres = Array.from(document.querySelectorAll('input[name="genre"]:checked')).map(cb => cb.value);
            const selectedDecades = Array.from(document.querySelectorAll('input[name="decade"]:checked')).map(cb => parseInt(cb.value));

            // Update UI count badge
            const totalFilters = selectedGenres.length + selectedDecades.length;
            const badge = document.getElementById('filter-count');
            if(totalFilters > 0) {
                badge.textContent = totalFilters;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            return songs.filter(song => {
                // 1. Text Search (Includes Year now)
                const searchString = `${song.Artist || ''} ${song.Name || ''} ${song.Genre || ''} ${song.Year || ''}`.toLowerCase();
                const matchesSearch = !searchTerm || searchString.includes(searchTerm);
                
                // 2. Genre Filter (OR logic within genres)
                // If no genres selected, allow all. If selected, song.Genre must be in list.
                const matchesGenre = selectedGenres.length === 0 || (song.Genre && selectedGenres.includes(song.Genre));

                // 3. Decade Filter (OR logic within decades)
                // If no decades selected, allow all.
                let matchesDecade = true;
                if (selectedDecades.length > 0) {
					// Parse the first 4 digits for the comparison logic
					const yearNum = song.Year ? parseInt(String(song.Year).substring(0, 4)) : null;
					const songDecade = yearNum ? Math.floor(yearNum / 10) * 10 : null;
					matchesDecade = songDecade && selectedDecades.includes(songDecade)
                }

                return matchesSearch && matchesGenre && matchesDecade;
            });
        }

        function updateDisplay() {
            let processedSongs = getFilteredList();
            processedSongs = sortSongs(processedSongs);
            renderSongs(processedSongs);
            updateSortIcons();
        }

        // --- Random Song Logic ---

        function pickRandomSong() {
            const currentList = getFilteredList(); // Pick from currently filtered songs
            if (currentList.length === 0) {
                alert("No songs available in the current filter to pick from!");
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * currentList.length);
            const song = currentList[randomIndex];
            const displayYear = song.Year ? String(song.Year).substring(0, 4) : 'N/A';

            const contentDiv = document.getElementById('random-song-content');
            contentDiv.innerHTML = `
                <div class="text-2xl font-bold text-indigo-700 mb-1 leading-tight">${song.Name}</div>
                <div class="text-lg text-gray-700 font-medium mb-4">by ${song.Artist}</div>
                <div class="flex justify-center gap-2 flex-wrap text-sm text-gray-500">
                    <span class="bg-gray-100 px-3 py-1 rounded-full border border-gray-200">📅 ${displayYear}</span>
                    <span class="bg-gray-100 px-3 py-1 rounded-full border border-gray-200">🎵 ${song.Genre || 'N/A'}</span>
                </div>
            `;
            
            document.getElementById('random-modal').classList.remove('hidden');
        }

        // --- Initialization ---

        document.addEventListener('DOMContentLoaded', () => {
            fetch('songs.json')
                .then(r => r.json())
                .then(data => {
                    songs = data;
                    populateFilters();
                    updateDisplay();
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('song-list-body').innerHTML = `<tr><td colspan="4" class="text-center text-red-500 py-4">Error loading data.</td></tr>`;
                });

            // Event Listeners
            document.getElementById('search-input').addEventListener('input', updateDisplay);

            // Filter Toggle
            document.getElementById('toggle-filter-btn').addEventListener('click', () => {
                document.getElementById('filter-panel').classList.toggle('hidden');
            });

            // Clear Buttons
            document.getElementById('clear-genres').addEventListener('click', () => {
                document.querySelectorAll('input[name="genre"]').forEach(cb => cb.checked = false);
                updateDisplay();
            });
            document.getElementById('clear-decades').addEventListener('click', () => {
                document.querySelectorAll('input[name="decade"]').forEach(cb => cb.checked = false);
                updateDisplay();
            });

            // Random Modal Listeners
            document.getElementById('random-song-btn').addEventListener('click', pickRandomSong);
            document.getElementById('modal-new-random').addEventListener('click', pickRandomSong);
            document.getElementById('modal-close').addEventListener('click', () => {
                document.getElementById('random-modal').classList.add('hidden');
            });
            
            // Close modal on outside click
            document.getElementById('random-modal').addEventListener('click', (e) => {
                if(e.target === document.getElementById('random-modal')) {
                    document.getElementById('random-modal').classList.add('hidden');
                }
            });

            // Sort Headers
            document.querySelectorAll('th[data-sort-key]').forEach(header => {
                header.addEventListener('click', () => {
                    const key = header.dataset.sortKey;
                    if (currentSortBy === key) {
                        currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSortBy = key;
                        currentSortOrder = 'asc';
                    }
                    updateDisplay();
                });
            });
        });

        function updateSortIcons() {
            document.querySelectorAll('.sort-icon').forEach(icon => icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>');
            
            const activeIcon = document.getElementById(`sort-icon-${currentSortBy}`);
            if (activeIcon) {
                activeIcon.innerHTML = currentSortOrder === 'asc' 
                    ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>'
                    : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="m19 12-7 7-7-7"/><path d="M12 5v14"/></svg>';
            }
        }
    </script>
</body>
</html>
